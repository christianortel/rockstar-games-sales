name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-build-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh source snapshots
        run: npm run data:ingest

      - name: Validate data
        run: npm run data:validate

      - name: Validate official anchors
        run: npm run data:official-anchors

      - name: Validate official extraction parser
        run: npm run data:official-extraction

      - name: Validate enrichment data
        run: npm run data:enrichment:validate

      - name: Verify enrichment dry-run safety
        run: npm run audit:enrichment-dry-run

      - name: Smoke database adapter
        run: npm run db:smoke

      - name: Audit queue guard
        run: npm run audit:queue

      - name: Production readiness report
        run: npm run audit:readiness

      - name: Verify strict readiness blocker state
        run: npm run audit:strict-blocker

      - name: Verify health contract
        run: npm run audit:health

      - name: Audit dependencies
        run: npm audit

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start -- -p 3002 > start-server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3002/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat start-server.log
          exit 1

      - name: Verify runtime routes
        env:
          APP_BASE_URL: http://127.0.0.1:3002
        run: npm run app:verify

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify browser readiness
        run: npm run audit:browser:strict

      - name: Verify visual dashboard surfaces
        env:
          APP_BASE_URL: http://127.0.0.1:3002
        run: npm run app:visual

      - name: Capture README screenshots
        env:
          APP_BASE_URL: http://127.0.0.1:3002
        run: npm run docs:screenshots

      - name: Upload README screenshots
        uses: actions/upload-artifact@v4
        with:
          name: readme-screenshots
          path: docs/screenshots/readme-*.png

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-debug-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/
            start-server.log
